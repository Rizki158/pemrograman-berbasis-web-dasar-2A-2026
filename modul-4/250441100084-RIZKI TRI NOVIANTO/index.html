<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/output.css" rel="stylesheet">
</head>

<body>

  <div class="h-screen flex">

    <div class="w-[65%] bg-[#5B74B8] text-white">
        <div class="max-w-6xl mt-32 px-56">
            <div class="justify-center items-center">
                <h1 class="items-center font-semibold text-5xl  ">
                    Hello Prospective Students
                </h1>
            </div>
            <div>
                <img src="UTS/gambar_login page.png" 
                class="w-auto ">
            </div>
            <div>
                <p class="font-semibold text-xl ">
                    Unlock your professional potential. Learn from <br>industry leaders and stay ahead of the <br>competition.
                </p>
            </div>
        </div>
    </div>

    <div class="w-[45%] bg-blue-50 flex items-center justify-center">

      <div class="bg-blue-50 w-full max-w-sm">

        <h2 class="text-center font-semibold text-lg ">LOGIN PAGE</h2>
        <p class="text-center font-semibold text-sm text-gray-400 mb-6">
          Masukkan Username dan Password Anda
        </p>

        <input id="email" type="text" placeholder="Email Address" class="w-full mb-4 px-4 py-2 rounded-md bg-white shadow-lg placeholder-[#5B74B8] border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 text-center font-semibold">

        <input id="password" type="password" placeholder="Password" class="w-full mb-4 px-4 py-2 rounded-md bg-white shadow-lg placeholder-[#5B74B8] border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 text-center font-semibold">

            <button id="btnhal2"class="w-full bg-blue-700 text-white py-2 rounded-md hover:bg-blue-800 transition shadow-lg mb-4">
                Login
            </button>


        <div class="flex items-center mb-4">
          <div class="flex-1 h-px bg-gray-300"></div>
          <span class="px-2 text-sm text-gray-500">Or Login With</span>
          <div class="flex-1 h-px bg-gray-300"></div>
        </div>

        <a  class="w-full bg-white border border-gray-300 py-2 rounded-md flex items-center justify-center shadow-lg gap-2 hover:bg-gray-100"href="https://accounts.google.com/">
            <img src="UTS/ic_google.svg" class="w-5">
            Sign in with Account Google
        </a>

      </div>
    </div>

  </div>
  <script src="index.js"></script>
</body>
</html>
